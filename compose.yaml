# Local development only (brief §3). Production Postgres is managed by
# CloudNativePG on the K8s cluster, not by this file. Run with:
#   docker compose up -d db
services:
  db:
    image: postgres:17
    environment:
      # Defaults are fine for local dev; override via the shell or .env if desired.
      POSTGRES_USER: ${POSTGRES_USER:-civicvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civicvault}
      POSTGRES_DB: ${POSTGRES_DB:-civicvault}
    ports:
      # Host 5433 (not 5432) to avoid clashing with a host-installed Postgres.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      # Persist data across container restarts.
      - pgdata:/var/lib/postgresql/data
      # Runs *.sql once, on first cluster init (empty data dir) — enables extensions.
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Lets `docker compose up --wait` / scripts block until Postgres accepts connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civicvault} -d ${POSTGRES_DB:-civicvault}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
