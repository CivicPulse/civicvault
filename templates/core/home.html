<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CivicVault</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        main { text-align: center; padding: 2rem; max-width: 40rem; }
        h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 0.5rem; letter-spacing: -0.02em; }
        p { font-size: 1.125rem; line-height: 1.6; color: #94a3b8; margin: 0.5rem 0; }
        .badge {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.35rem 0.85rem;
            border: 1px solid #334155;
            border-radius: 999px;
            font-size: 0.8rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <main>
        <h1>CivicVault</h1>
        <p>A public, source-linked knowledge base for local government.</p>
        <p>Hello, world — the skeleton is running.</p>
        <span class="badge">Django {{ request.META.SERVER_SOFTWARE|default:"dev" }}</span>
    </main>
</body>
</html>
