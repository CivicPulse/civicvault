apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The Secret (civicvault-secrets) and the cloudflared-config edit are applied
# out-of-band — see k8s/README.md. secret.example.yaml is a template, not a
# resource, so it is intentionally NOT listed here.
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - ingressroute.yaml

# CI overrides the tag per build:
#   kustomize edit set image ghcr.io/civicpulse/civicvault=ghcr.io/civicpulse/civicvault:sha-<sha>
images:
  - name: ghcr.io/civicpulse/civicvault
    newTag: latest
