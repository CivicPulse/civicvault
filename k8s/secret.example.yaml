# TEMPLATE ONLY — do not commit real values, and do not `kubectl apply` this file
# as-is. The live Secret is created out-of-band (the cluster has no
# sealed-secrets/SOPS). Create it with literal values, e.g.:
#
#   kubectl create secret generic civicvault-secrets -n civicvault \
#     --from-literal=SECRET_KEY="$(uv run python -c 'from django.core.management.utils import get_random_secret_key as k; print(k())')" \
#     --from-literal=DEBUG=False \
#     --from-literal=ALLOWED_HOSTS=vault.civpulse.org \
#     --from-literal=CSRF_TRUSTED_ORIGINS=https://vault.civpulse.org \
#     --from-literal=DATABASE_URL='postgres://civicvault:<password>@<managed-pg-host>:25060/civicvault?sslmode=require' \
#     --from-literal=R2_BUCKET=civicvault-media \
#     --from-literal=R2_ENDPOINT_URL=https://<accountid>.r2.cloudflarestorage.com \
#     --from-literal=R2_ACCESS_KEY_ID=<key> \
#     --from-literal=R2_SECRET_ACCESS_KEY=<secret> \
#     --from-literal=R2_CUSTOM_DOMAIN=data.civpulse.org
#
# Managed Postgres requires sslmode=require and uses port 25060. Leave the R2_*
# keys out (or empty R2_BUCKET) to fall back to local filesystem media storage.
apiVersion: v1
kind: Secret
metadata:
  name: civicvault-secrets
  namespace: civicvault
  labels:
    app.kubernetes.io/name: civicvault
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_ME"
  DEBUG: "False"
  ALLOWED_HOSTS: "vault.civpulse.org"
  CSRF_TRUSTED_ORIGINS: "https://vault.civpulse.org"
  DATABASE_URL: "postgres://civicvault:REPLACE_ME@REPLACE_HOST:25060/civicvault?sslmode=require"
  R2_BUCKET: ""
  R2_ENDPOINT_URL: ""
  R2_ACCESS_KEY_ID: ""
  R2_SECRET_ACCESS_KEY: ""
  R2_CUSTOM_DOMAIN: ""
